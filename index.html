<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Game of Life - Refactored</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        #grid {
            user-select: none;
            touch-action: none;
        }
    </style>
</head>
<body class="bg-light py-4">
    <div class="container-fluid">
        <div class="row justify-content-center">
            <div class="col-auto">
                <div class="card shadow">
                    <h4 class="card-header text-center bg-dark text-white">
                        Conway's Game of Life
                    </h4>
                    
                    <div class="card-body p-0 text-center">
                        <canvas id="grid"></canvas>     
                    </div>
                    
                    <div class="card-footer d-flex justify-content-center align-items-center flex-wrap gap-2 py-3">
                        <div class="input-group" style="width: auto;">
                            <span class="input-group-text">Delay (ms)</span>
                            <input id="delayInput" type="number" class="form-control" min="50" max="3000" style="max-width: 100px;">
                        </div>
                        
                        <div class="btn-group">
                            <button id="btnFill" class="btn btn-warning">Fill Random</button>
                            <button id="btnStart" class="btn btn-success">Start</button>
                            <button id="btnPause" class="btn btn-secondary">Pause</button>
                            <button id="btnReset" class="btn btn-danger">Clear</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="GameOfLife.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById("grid");
        
            const app = new GameController(canvas, 100, 100, 8, 100);
            const delayInput = document.getElementById('delayInput');
            delayInput.value = app.delay;
            
            delayInput.addEventListener('input', (e) => {
                app.setDelay(Number(e.target.value));
            });

            document.getElementById('btnFill').addEventListener('click', () => app.fillRandom());
            document.getElementById('btnStart').addEventListener('click', () => app.start());
            document.getElementById('btnPause').addEventListener('click', () => app.pause());
            document.getElementById('btnReset').addEventListener('click', () => app.reset());
        });
    </script>
</body>
</html>
