<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Game of Life</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        #grid {
            user-select: none;
            touch-action: none;
            background-color: #fff;
        }
        /* Небольшой контейнер для скролла, если поле огромное (например 1000x1000) */
        .canvas-container {
            max-width: 100%;
            overflow: auto;
            background-color: #f8f9fa;
        }
    </style>
</head>
<body class="bg-light py-4">
    <div class="container-fluid">
        <div class="row justify-content-center">
            <div class="col-auto">
                
                <div class="card shadow mb-3">
                    <div class="card-header bg-secondary text-white">
                        <strong>Grid Configuration</strong>
                    </div>
                    <div class="card-body py-2">
                        <form id="configForm" class="row g-2 align-items-center">
                            <div class="col-auto">
                                <label class="col-form-label col-form-label-sm">Width:</label>
                            </div>
                            <div class="col-auto">
                                <input type="number" id="inputW" class="form-control form-control-sm" style="width: 80px;" min="10" max="1000">
                            </div>
                            <div class="col-auto">
                                <label class="col-form-label col-form-label-sm">Height:</label>
                            </div>
                            <div class="col-auto">
                                <input type="number" id="inputH" class="form-control form-control-sm" style="width: 80px;" min="10" max="1000">
                            </div>
                            <div class="col-auto">
                                <label class="col-form-label col-form-label-sm">Cell Size:</label>
                            </div>
                            <div class="col-auto">
                                <input type="number" id="inputC" class="form-control form-control-sm" style="width: 70px;" min="1" max="50">
                            </div>
                            <div class="col-auto">
                                <button type="submit" class="btn btn-sm btn-outline-primary">Apply & Reload</button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="card shadow">
                    <h4 class="card-header text-center bg-dark text-white">
                        Conway's Game of Life
                    </h4>
                    
                    <div class="card-body p-0 text-center canvas-container">
                        <canvas id="grid"></canvas>     
                    </div>
                    
                    <div class="card-footer d-flex justify-content-center align-items-center flex-wrap gap-2 py-3">
                        <div class="input-group input-group-sm" style="width: auto;">
                            <span class="input-group-text">Delay (ms)</span>
                            <input id="delayInput" type="number" class="form-control" min="16" max="3000" style="max-width: 80px;">
                        </div>
                        
                        <div class="btn-group btn-group-sm">
                            <button id="btnFill" class="btn btn-warning">Fill Random</button>
                            <button id="btnStart" class="btn btn-success">Start</button>
                            <button id="btnPause" class="btn btn-secondary">Pause</button>
                            <button id="btnReset" class="btn btn-danger">Clear</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="GameOfLife.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 1. Считываем параметры из URL. Если их нет, используем дефолтные значения.
            const urlParams = new URLSearchParams(window.location.search);
            const w = parseInt(urlParams.get('w')) || 100;
            const h = parseInt(urlParams.get('h')) || 100;
            const c = parseInt(urlParams.get('c')) || 10;
            const d = parseInt(urlParams.get('d')) || 100; // delay

            // 2. Инициализируем UI конфигурации текущими значениями
            document.getElementById('inputW').value = w;
            document.getElementById('inputH').value = h;
            document.getElementById('inputC').value = c;
            
            // 3. Обработчик изменения конфигурации (перезаписывает URL)
            document.getElementById('configForm').addEventListener('submit', (e) => {
                e.preventDefault();
                const newW = document.getElementById('inputW').value;
                const newH = document.getElementById('inputH').value;
                const newC = document.getElementById('inputC').value;
                // Обновляем параметры страницы, что приведет к её перезагрузке
                window.location.search = `?w=${newW}&h=${newH}&c=${newC}&d=${app.delay}`;
            });

            // 4. Инициализация самой игры с полученными настройками
            const canvas = document.getElementById("grid");
            const app = new GameController(canvas, w, h, c, d);

            // 5. Привязка контролов управления процессом
            const delayInput = document.getElementById('delayInput');
            delayInput.value = app.delay;
            
            delayInput.addEventListener('input', (e) => {
                app.setDelay(Number(e.target.value));
            });

            document.getElementById('btnFill').addEventListener('click', () => app.fillRandom());
            document.getElementById('btnStart').addEventListener('click', () => app.start());
            document.getElementById('btnPause').addEventListener('click', () => app.pause());
            document.getElementById('btnReset').addEventListener('click', () => app.reset());
        });
    </script>
</body>
</html>
