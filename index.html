<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Conway's Game of Life - Ultra Performance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Главный трюк: заставляем браузер увеличивать холст аппаратно с сохранением резкости пикселей */
        #grid {
            user-select: none;
            touch-action: none;
            width: 100%;
            height: auto;
            max-width: 800px; /* Ограничиваем максимальный размер на экране для удобства */
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-crisp-edges;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            border: 1px solid #ccc;
        }
        .canvas-container {
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body class="bg-light py-4">
    <div class="container-fluid">
        <div class="row justify-content-center">
            <div class="col-auto">
                
                <div class="card shadow mb-3">
                    <div class="card-header bg-secondary text-white py-2">
                        <strong>Конфигурация сетки</strong>
                    </div>
                    <div class="card-body py-2">
                        <form id="configForm" class="row g-2 align-items-center">
                            <div class="col-auto">
                                <label class="col-form-label col-form-label-sm">Ширина:</label>
                            </div>
                            <div class="col-auto">
                                <input type="number" id="inputW" class="form-control form-control-sm" style="width: 80px;" min="10" max="2000">
                            </div>
                            <div class="col-auto">
                                <label class="col-form-label col-form-label-sm">Высота:</label>
                            </div>
                            <div class="col-auto">
                                <input type="number" id="inputH" class="form-control form-control-sm" style="width: 80px;" min="10" max="2000">
                            </div>
                            <div class="col-auto">
                                <button type="submit" class="btn btn-sm btn-primary">Применить и очистить</button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="card shadow">
                    <h4 class="card-header text-center bg-dark text-white py-3 m-0">
                        Игра «Жизнь» Конвея
                    </h4>
                    
                    <div class="card-body p-3 text-center canvas-container">
                        <canvas id="grid"></canvas>     
                    </div>
                    
                    <div class="card-footer d-flex justify-content-center align-items-center flex-wrap gap-2 py-3">
                        <div class="input-group input-group-sm" style="width: auto;">
                            <span class="input-group-text">Задержка (мс)</span>
                            <input id="delayInput" type="number" class="form-control" min="0" max="3000" style="max-width: 80px;">
                        </div>
                        
                        <div class="btn-group btn-group-sm">
                            <button id="btnFill" class="btn btn-warning">Заполнить случайно</button>
                            <button id="btnStart" class="btn btn-success">Старт</button>
                            <button id="btnPause" class="btn btn-secondary">Пауза</button>
                            <button id="btnReset" class="btn btn-danger">Очистить</button>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="GameOfLife.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const w = parseInt(urlParams.get('w')) || 100;
            const h = parseInt(urlParams.get('h')) || 100;
            const d = parseInt(urlParams.get('d')) || 50;

            document.getElementById('inputW').value = w;
            document.getElementById('inputH').value = h;
            
            document.getElementById('configForm').addEventListener('submit', (e) => {
                e.preventDefault();
                const newW = document.getElementById('inputW').value;
                const newH = document.getElementById('inputH').value;
                window.location.search = `?w=${newW}&h=${newH}&d=${app.delay}`;
            });

            const canvas = document.getElementById("grid");
            const app = new GameController(canvas, w, h, d);

            const delayInput = document.getElementById('delayInput');
            delayInput.value = app.delay;
            
            delayInput.addEventListener('input', (e) => {
                app.setDelay(Number(e.target.value));
            });

            document.getElementById('btnFill').addEventListener('click', () => app.fillRandom());
            document.getElementById('btnStart').addEventListener('click', () => app.start());
            document.getElementById('btnPause').addEventListener('click', () => app.pause());
            document.getElementById('btnReset').addEventListener('click', () => app.reset());
        });
    </script>
</body>
</html>
